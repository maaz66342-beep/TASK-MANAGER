openapi: 3.0.0
info:
  title: Task Manager API
  description: Scalable REST API with JWT Auth & Role-Based Access Control
  version: 1.0.0
  contact:
    name: API Support

servers:
  - url: http://localhost:5000/api/v1
    description: Development server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string, format: email }
        role: { type: string, enum: [user, admin] }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }

    Task:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        description: { type: string }
        status: { type: string, enum: [pending, in_progress, completed] }
        priority: { type: string, enum: [low, medium, high] }
        dueDate: { type: string, format: date }
        userId: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }

    Error:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string }

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name: { type: string, example: John Doe }
                email: { type: string, example: john@example.com }
                password: { type: string, example: password123 }
      responses:
        201:
          description: User registered successfully
        409:
          description: Email already exists

  /auth/login:
    post:
      tags: [Auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, example: john@example.com }
                password: { type: string, example: password123 }
      responses:
        200:
          description: Login successful, returns JWT token
        401:
          description: Invalid credentials

  /auth/me:
    get:
      tags: [Auth]
      summary: Get logged in user
      security: [{ BearerAuth: [] }]
      responses:
        200:
          description: Current user data
        401:
          description: Unauthorized

  /tasks:
    get:
      tags: [Tasks]
      summary: Get all tasks (own tasks for user, all for admin)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [pending, in_progress, completed] }
        - in: query
          name: priority
          schema: { type: string, enum: [low, medium, high] }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 10 }
        - in: query
          name: search
          schema: { type: string }
      responses:
        200:
          description: List of tasks with pagination

    post:
      tags: [Tasks]
      summary: Create a new task
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string, example: Complete project }
                description: { type: string }
                status: { type: string, enum: [pending, in_progress, completed] }
                priority: { type: string, enum: [low, medium, high] }
                dueDate: { type: string, format: date }
      responses:
        201:
          description: Task created

  /tasks/{id}:
    get:
      tags: [Tasks]
      summary: Get task by ID
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        200:
          description: Task data
        404:
          description: Task not found

    put:
      tags: [Tasks]
      summary: Update task
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                description: { type: string }
                status: { type: string, enum: [pending, in_progress, completed] }
                priority: { type: string, enum: [low, medium, high] }
                dueDate: { type: string, format: date }
      responses:
        200:
          description: Task updated
        404:
          description: Task not found

    delete:
      tags: [Tasks]
      summary: Delete task
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        200:
          description: Task deleted
        404:
          description: Task not found

  /admin/stats:
    get:
      tags: [Admin]
      summary: Get platform statistics (Admin only)
      security: [{ BearerAuth: [] }]
      responses:
        200:
          description: Stats data
        403:
          description: Forbidden

  /admin/users:
    get:
      tags: [Admin]
      summary: Get all users (Admin only)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: page
          schema: { type: integer }
        - in: query
          name: limit
          schema: { type: integer }
      responses:
        200:
          description: List of all users

  /admin/users/{id}/toggle:
    patch:
      tags: [Admin]
      summary: Toggle user active status (Admin only)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        200:
          description: User status toggled
